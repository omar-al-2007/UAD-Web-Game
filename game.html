<body class="game-page">

  <!-- اغنيه -->
  <audio id="welcome-bg-sound" src="https://files.catbox.moe/1m8o5s.mp3" preload="metadata" autoplay playsinline></audio>

  <!-- Portrait warning -->

  <!-- Main layout -->

    <!-- Canvas area -->
    <div id="canvasWrapper">
      <div class="hud">

        <div class="center-info">⭐ <span id="score">0</span><br>⏱ <span id="time">00:00</span><br><span id="diffDisplay"></span></div>
        <div class="player-info">👤 <span id="nickShow">لاعب</span><br>❤️ <span id="pLives">3</span> | 💰 <span id="spBalance">0</span></div>

      <canvas id="game" width="1000" height="500"></canvas>
    </div>

    <!-- Controls -->
    <div id="controls">
      <div class="control-group">

    </div>

    <!-- Menu overlay -->
    <div class="overlay" id="menu">
      <h1>The Shader Zones V 0.1</h1>
      <p class="menu-balance">رصيدك: <span id="menuSP">0</span> SP</p>
      <input type="text" id="nameInput" placeholder="اكتب لقبك" maxlength="10"/>
      <div class="difficulty-selector">
        <button class="diff-btn active" onclick="setDiff('EASY',this)">سهل 😊</button>
        <button class="diff-btn"        onclick="setDiff('MEDIUM',this)">وسط 😐</button>
        <button class="diff-btn"        onclick="setDiff('HARD',this)">صعب 😈</button>
      </div>
      <button class="btn-main" onclick="startGame()">دخول اللعبة</button>
      <button class="btn-main btn-shop" onclick="showShop(true)">🛒 المتجر</button>

    <div class="overlay hidden" id="shopMenu">

      <div class="shop-grid">
        <div class="item-card">
          <div class="item-preview">
            <img src="https://i.postimg.cc/8zKWbjfP/dummy.png" alt="skin" loading="lazy"
              onerror="this.nextElementSibling.style.display='flex';this.style.display='none'">
            <span class="no-img-label">No img</span>
          </div>
          <b class="item-title">دمية التجارب</b><br>
          <span class="price-tag">10,000 SP</span>
          <button class="btn-main buy-button" id="buyBtn"
            onclick="handleBuy('dummy')">شراء</button>
        </div>
      </div>
      <button class="btn-main btn-back" onclick="showShop(false)">إغلاق</button>
    </div>

    <!-- Result overlay -->
    <div class="overlay hidden" id="resultScreen">
      <h1 id="resTitle">النتيجة</h1>
      <div class="result-stats">
        <p><span class="stat-label">النقاط</span><span class="stat-value" id="resScore">0</span></p>
        <p><span class="stat-label">الربح</span><span class="stat-value" id="resEarned">+0 SP</span></p>
      </div>
      <button class="btn-main" onclick="backToMenu()">القائمة الرئيسية</button>
    </div>

    <!-- Countdown -->
    <div class="hidden" id="countdownOverlay">
      <div id="countdownNumber">3</div>
    </div>

<script>
// ══════════════════════════════════════
//  CANVAS RESPONSIVE SCALING
// ══════════════════════════════════════
const canvas  = document.getElementById("game");
const ctx     = canvas.getContext("2d");
const GAME_W  = 1000, GAME_H = 500;

function fitCanvas() {
  const wrap = document.getElementById("canvasWrapper");
  const wW = wrap.clientWidth, wH = wrap.clientHeight;
  const scale = Math.min(wW / GAME_W, wH / GAME_H);
  canvas.style.width  = Math.floor(GAME_W * scale) + "px";
  canvas.style.height = Math.floor(GAME_H * scale) + "px";
}

window.addEventListener("resize", fitCanvas);
screen.orientation && screen.orientation.addEventListener("change", fitCanvas);
fitCanvas();

// ══════════════════════════════════════
//  PERSISTENCE
// ══════════════════════════════════════
let SP          = parseInt(localStorage.getItem("shaderPoints") || "0");
let ownedSkins  = JSON.parse(localStorage.getItem("ownedSkins")  || '["default"]');
let equippedSkin= localStorage.getItem("equippedSkin") || "default";

function savePersist() {
  localStorage.setItem("shaderPoints", SP);
  localStorage.setItem("ownedSkins",   JSON.stringify(ownedSkins));
  localStorage.setItem("equippedSkin", equippedSkin);
}

// ══════════════════════════════════════
//  SOUND
// ══════════════════════════════════════
function makeSound() {
  const ac = new (window.AudioContext || window.webkitAudioContext)();
  const tone = (f,d,t='sine') => {
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.value=f; osc.type=t;
    g.gain.setValueAtTime(.3,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.01,ac.currentTime+d);
    osc.start(ac.currentTime); osc.stop(ac.currentTime+d);
  };
  return {
    ping:    ()=>tone(800,.1),
    hit:     ()=>tone(600,.15),
    score:   ()=>tone(1200,.2),
    lose:    ()=>tone(200,.5),
    win:     ()=>tone(1400,.3),
    count:   ()=>tone(800,.2),
    go:      ()=>tone(1200,.3),
  };
}
let SFX;
try { SFX = makeSound(); } catch(e) { SFX = { ping:()=>{},hit:()=>{},score:()=>{},lose:()=>{},win:()=>{},count:()=>{},go:()=>{} }; }

// ══════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════
const DIFF = {
  EASY:   { rm:.50, rM:.70, err:80, spd:2, acc:.70 },
  MEDIUM: { rm:.25, rM:.40, err:50, spd:4, acc:.85 },
  HARD:   { rm:.05, rM:.15, err:20, spd:6, acc:.95 },
};
let diffLevel = "EASY";

let running=false, score=0, lives=3, botLives=5;
let timer=0, lastTime=0, loopActive=false;
let isDev=false, cooldown=0, maxCD=5;
let beam=0, parts=[];

const p1  = { x:20,  y:190, w:15, h:120, color:"#00f2ff", speed:10 };
const bot = { x:965, y:190, w:15, h:120, color:"#ff2e63",
              speed:6, rt:0, targetY:250 };
const ball = { x:500, y:250, r:10, vx:7, vy:7 };

const ABILITIES = [
  { n:"سرعة ⚡",    f:()=>{ p1.speed*=2;  setTimeout(()=>p1.speed/=2,   3000); } },
  { n:"ضخم 🛡️",    f:()=>{ p1.h*=1.8;    setTimeout(()=>p1.h/=1.8,     4000); } },
  { n:"كرة ثلج ❄️", f:()=>{ ball.vx*=.5; ball.vy*=.5;
                             setTimeout(()=>{ ball.vx*=2; ball.vy*=2; }, 3000); } },
];
let curAb = ABILITIES[0];

const dummyImg = new Image(); dummyImg.src = "https://i.postimg.cc/8zKWbjfP/dummy.png";

// ══════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════
function el(id) { return document.getElementById(id); }

function updateHUD() {
  el("spBalance").textContent  = SP.toLocaleString();
  el("menuSP").textContent     = SP.toLocaleString();
  el("shopSP").textContent     = SP.toLocaleString();
  el("pLives").textContent     = isDev ? "♾️" : lives;
  el("bLives").textContent     = botLives;
  el("diffDisplay").textContent = ({EASY:"سهل 😊",MEDIUM:"وسط 😐",HARD:"صعب 😈"}[diffLevel]);
  const buyBtn = el("buyBtn");
  if (ownedSkins.includes("dummy")) {
    buyBtn.textContent = equippedSkin==="dummy" ? "إزالة" : "تجهيز";
    buyBtn.style.background = equippedSkin==="dummy" ? "#555" : "var(--win)";
  } else {
    buyBtn.textContent = "شراء";
    buyBtn.style.background = "var(--accent)";
  }
}

function setDiff(level, btn) {
  diffLevel = level;
  document.querySelectorAll(".diff-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function showShop(show) {
  el("menu").classList.toggle("hidden", show);
  el("shopMenu").classList.toggle("hidden", !show);
  updateHUD();
}

function handleBuy(id) {
  if (id==="dummy") {
    if (ownedSkins.includes("dummy")) {
      equippedSkin = equippedSkin==="dummy" ? "default" : "dummy";
    } else {
      if (SP >= 10000) { SP -= 10000; ownedSkins.push("dummy"); equippedSkin="dummy"; }
      else alert("Shader Points غير كافية!");
    }
  }
  savePersist(); updateHUD();
}

function pickAbility() {
  curAb = ABILITIES[Math.floor(Math.random()*ABILITIES.length)];
  el("abStatus").textContent = "جاهز: " + curAb.n;
}

function resetBall(dir) {
  ball.x=500; ball.y=250;
  ball.vx=dir*7; ball.vy=(Math.random()-.5)*10;
  bot.rt=0; SFX.ping();
}

function activateAbility() {
  if (cooldown>0 || !running) return;
  curAb.f(); cooldown=maxCD;
  el("abilityBtn").style.opacity=".4";
  SFX.score(); setTimeout(pickAbility,500);
}

function triggerGigaKill() {
  if (!isDev) return;
  botLives--; beam=1.0;
  el("gameContainer").classList.add("shake");
  for(let i=0;i<30;i++) parts.push({x:bot.x,y:bot.y+60,vx:(Math.random()-.5)*20,vy:(Math.random()-.5)*20,l:1});
  score+=100; SFX.win();
  if (botLives<=0) endGame(true);
  setTimeout(()=>el("gameContainer").classList.remove("shake"),400);
}

// ══════════════════════════════════════
//  GAME FLOW
// ══════════════════════════════════════
function showCountdown(cb) {
  let n=3;
  el("countdownOverlay").classList.remove("hidden");
  el("countdownNumber").textContent=n;
  SFX.count();
  const iv=setInterval(()=>{
    n--;
    if(n>0){ el("countdownNumber").textContent=n; SFX.count(); }
    else   { clearInterval(iv); el("countdownOverlay").classList.add("hidden"); SFX.go(); cb(); }
  },1000);
}

// دالة تشفير بسيطة لتحويل الكلمة إلى رقم هاش سري
function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = (hash << 5) - hash + str.charCodeAt(i);
    hash |= 0; // تحويله إلى 32bit integer
  }
  return hash;
}

function startGame() {
  const name = el("nameInput").value.trim();
  isDev = hashCode(name) === 2124503794;
  
  p1.color = isDev ? "#ffcc00" : "#00f2ff";
  p1.speed = isDev ? 18 : 10;
  lives = isDev ? 999 : 3; 
  maxCD = isDev ? 1 : 5;
  
  el("devKillBtn").style.display = isDev ? "block" : "none";
  el("nickShow").textContent = isDev ? "المطور" : (name || "لاعب");
  
  score = 0; 
  timer = 0; 
  botLives = 5; 
  cooldown = 0; 
  parts = [];
  
  pickAbility(); 
  resetBall(1);
  el("menu").classList.add("hidden");
  updateHUD();
  showCountdown(() => { 
    running = true; 
    loopActive = true; 
    lastTime = performance.now();
    requestAnimationFrame(loop);
  });
}

function endGame(win) {
  running = false;
  loopActive = false; // pause render loop to save CPU
  const earned = Math.floor(score/5);
  SP += earned; savePersist();
  el("resultScreen").classList.remove("hidden");
  el("resTitle").textContent = win?"🏆 فوز!":"💀 خسارة!";
  el("resTitle").style.color = win?"var(--win)":"var(--lose)";
  el("resScore").textContent  = Math.floor(score);
  el("resEarned").textContent = "+"+earned+" SP";
  win ? SFX.win() : SFX.lose();
  updateHUD();
}

function backToMenu() {
  el("resultScreen").classList.add("hidden");
  el("menu").classList.remove("hidden");
}

// ══════════════════════════════════════
//  INPUT
// ══════════════════════════════════════
const keys={};
window.onkeydown = e => { keys[e.key.toLowerCase()]=true; if(e.key.toLowerCase()==="e") activateAbility(); };
window.onkeyup   = e => keys[e.key.toLowerCase()]=false;

function bindTouch(id, key) {
  const el2 = el(id);
  el2.ontouchstart = el2.onmousedown = e=>{ e.preventDefault(); keys[key]=true; };
  el2.ontouchend   = el2.onmouseup   = e=>{ e.preventDefault(); keys[key]=false; };
}
bindTouch("upBtn","w"); bindTouch("downBtn","s");

// ══════════════════════════════════════
//  AI
// ══════════════════════════════════════
function predictY() {
  if (ball.vx<=0) return ball.y;
  let t=(bot.x-ball.x)/ball.vx; if(t<0)t=0;
  let y=ball.y+ball.vy*t;
  while(y<0||y>GAME_H){ if(y<0)y=-y; else y=2*GAME_H-y; }
  return y;
}

function botAI(dt) {
  if (ball.vx>0 && ball.x>GAME_W/3) {
    const d=DIFF[diffLevel];
    let py=predictY();
    if (Math.random()>d.acc) py+=(Math.random()-.5)*d.err*2;
    if(bot.rt>0) bot.rt-=dt;
    else { bot.rt=d.rm+Math.random()*(d.rM-d.rm); bot.targetY=py; }
    bot.targetY+=(Math.random()-.5)*d.err;
    const spd=6+d.spd;
    const dist=bot.targetY-(bot.y+bot.h/2);
    if(Math.abs(dist)>2){ if(dist>0)bot.y+=spd; else bot.y-=spd; }
    bot.y=Math.max(0,Math.min(GAME_H-bot.h,bot.y));
  }
}

// ══════════════════════════════════════
//  UPDATE & DRAW
// ══════════════════════════════════════
function drawRect(x,y,w,h,r=8) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function update(dt) {
  if(!running) return;
  if((keys.w||keys.arrowup)   &&p1.y>0)           p1.y-=p1.speed;
  if((keys.s||keys.arrowdown) &&p1.y<GAME_H-p1.h) p1.y+=p1.speed;
  botAI(dt);
  ball.x+=ball.vx; ball.y+=ball.vy;
  if (ball.y - ball.r <= 0 || ball.y + ball.r >= GAME_H) { ball.vy *= -1; SFX.hit(); }
  const pad = ball.vx < 0 ? p1 : bot;
  if (ball.x - ball.r < pad.x + pad.w && ball.x + ball.r > pad.x && ball.y - ball.r < pad.y + pad.h && ball.y + ball.r > pad.y) {
    ball.vx *= -1.05;
    ball.x = (pad === p1) ? pad.x + pad.w + ball.r : pad.x - ball.r;
    SFX.hit();
  }
  if (ball.x - ball.r < 0) { if (!isDev) lives--; resetBall(1); if (lives <= 0) endGame(false); }
  if (ball.x + ball.r > GAME_W) { score += 50; botLives--; resetBall(-1); SFX.score(); if (botLives <= 0) endGame(true); }

  if(cooldown>0){
    cooldown-=dt;
    el("cdBar").style.width=(cooldown/maxCD)*100+"%";
    el("abStatus").textContent=Math.ceil(cooldown)+"s";
  } else {
    el("abilityBtn").style.opacity="1";
    el("abStatus").textContent="تفعيل: "+curAb.n;
    el("cdBar").style.width="0%";
  }
  parts.forEach((p,i)=>{ p.x+=p.vx; p.y+=p.vy; p.l-=.02; if(p.l<=0) parts.splice(i,1); });
  if(beam>0) beam-=.04;
  timer+=dt;
  el("score").textContent=Math.floor(score);
  el("time").textContent=Math.floor(timer/60).toString().padStart(2,"0")+":"+(Math.floor(timer)%60).toString().padStart(2,"0");
  updateHUD();
}

function draw() {
  ctx.clearRect(0,0,GAME_W,GAME_H);
  ctx.strokeStyle="rgba(255,255,255,.08)"; ctx.setLineDash([10,10]);
  ctx.beginPath(); ctx.moveTo(500,0); ctx.lineTo(500,GAME_H); ctx.stroke(); ctx.setLineDash([]);

  // Player
  if(equippedSkin==="dummy"&&dummyImg.complete&&dummyImg.naturalWidth){
    drawRect(p1.x,p1.y,p1.w,p1.h); ctx.fillStyle=p1.color; ctx.fill();
    ctx.drawImage(dummyImg,p1.x,p1.y,p1.w,p1.h);
  } else {
    drawRect(p1.x,p1.y,p1.w,p1.h); ctx.fillStyle=p1.color; ctx.fill();
  }
  // Bot
  drawRect(bot.x,bot.y,bot.w,bot.h); ctx.fillStyle=bot.color; ctx.fill();
  // Ball
  ctx.fillStyle="#fff"; ctx.shadowBlur=10; ctx.shadowColor="#fff";
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  // Beam
  if(beam>0){
    ctx.strokeStyle=`rgba(255,204,0,${beam})`; ctx.lineWidth=15;
    ctx.beginPath(); ctx.moveTo(p1.x+15,p1.y+p1.h/2); ctx.lineTo(bot.x,bot.y+bot.h/2); ctx.stroke();
  }
  // Particles
  parts.forEach(p=>{ctx.fillStyle=`rgba(255,46,99,${p.l})`;ctx.fillRect(p.x,p.y,4,4);});
}

function loop(t) {
  if(!loopActive) return;
  update((t-lastTime)/1000||.016);
  lastTime=t; draw();
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
updateHUD();
// don't run the render loop until gameplay starts (saves CPU when in menu)
loopActive = false; // will be enabled when the countdown finishes
// requestAnimationFrame(loop); // started when gameplay begins

function autoPlaySound() { //جديد للاغنيه
        const audio = document.getElementById('welcome-bg-sound');
        if (audio) {
            audio.volume = 0; // يبدأ من الصفر لعمل تأثير دخول ناعم
            audio.play().then(() => {
                // تأثير Fade-in: رفع الصوت تدريجياً خلال ثانية واحدة ليكون مريحاً
                let fadeInterval = setInterval(() => {
                    if (audio.volume < 0.4) { // أقصى حد لقوة الصوت 40% ليكون خلفية هادئة
                        audio.volume += 0.05;
                    } else {
                        clearInterval(fadeInterval);
                    }
                }, 100);
            }).catch(error => {
                console.log("المتصفح يتطلب تفاعل مسبق لتشغيل الصوت:", error);
            });
        }
        // إزالة المستمعات فور تشغيل الصوت حتى لا يتكرر الكود مع كل نقرة
        document.removeEventListener('click', autoPlaySound);
        document.removeEventListener('keydown', autoPlaySound);
    }

    // الانتظار لأي تفاعل من المستخدم (نقرة أو ضغط زر) لتشغيل الصوت فوراً
    document.addEventListener('click', autoPlaySound);
    document.addEventListener('keydown', autoPlaySound);
    window.addEventListener('load', autoPlaySound);

    // تسجيل Service Worker للعمل بدون اتصال
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(registration => console.log('✅ Service Worker مسجل بنجاح', registration))
        .catch(error => console.log('❌ فشل تسجيل Service Worker:', error));
    }
</script>
